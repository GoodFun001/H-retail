# 测试环境配置
spring:
  datasource:
    url: jdbc:h2:mem:retail_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms
  rabbitmq:
    host: localhost
    port: 5672
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: test-secret-key-for-unit-testing-only-not-for-production
  expiration: 3600000

logging:
  level:
    com.retail: DEBUG
